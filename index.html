<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datatables Example</title>
    <link rel="stylesheet" type="text/css" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.1.3/css/bootstrap.min.css"/>
<link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/v/bs5/jq-3.6.0/dt-1.12.1/sp-2.0.1/sl-1.4.0/datatables.min.css"/>
 
<script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
<script type="text/javascript" src="https://cdn.datatables.net/v/bs5/jq-3.6.0/dt-1.12.1/sp-2.0.1/sl-1.4.0/datatables.min.js"></script>
</head>


<script>


    $(document).ready(function () {
        $('#courses').DataTable({
            ajax: {
                url: "Regular.json",
                dataSrc: ""
            },
            searchPanes: {
                cascadePanes: true
            },
            dom: 'Pfrtip',
            columnDefs: [
                {
                    visible: false,
                    targets: [4, 5]
                },
                {
                    searchPanes: {
                        show: true,
                        combiner: 'and',
                        orthogonal: 'sp'
                    },
                    render: {
                        _: '[<br> ].Name',
                        sp: '[].Name'
                    },
                    targets: [0, 8, 9, 14, 16]
                },
                {
                    type: 'num',
                    targets: [3, 6, 10, 11, 12, 13]
                }
        ],
            columns: [
                { data: 'Subject' }, //0
                { data: 'CRN' },
                { data: 'Abbreviation' },
                { data: 'Level' },
                { data: 'Section' },
                { data: 'CMP' }, //5
                { data: 'Credits' },
                { data: 'Title' },
                { data: 'Days' },
                { data: 'Time' },
                { data: 'Capacity' }, //10
                { data: 'Registered' }, //11
                { data: 'Remaining' }, //12
                { data: 'Waitlisted' }, //13
                { data: 'Instructors' }, //14
                { data: 'Date' }, //15
                { data: 'Attributes' }
            ]
        });
    });
</script>

<body>
    <table id="courses" class="table table-striped" width="100%">
        <thead>
            <tr>
                <th>Subject</th>
                <th>CRN</th>
                <th>Abbreviation</th>
                <th>Level</th>
                <th>Section</th>
                <th>CMP</th>
                <th>Credits</th>
                <th>Title</th>
                <th>Days</th>
                <th>Time</th>
                <th>Capacity</th>
                <th>Registered</th>
                <th>Remaining</th>
                <th>Waitlisted</th>
                <th>Instructors</th>
                <th>Date</th>
                <th>Attributes</th>
            </tr>
        </thead>
    </table>
</body>

</html>
