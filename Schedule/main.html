<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses</title>
    <link rel="stylesheet" type="text/css"
        href="https://cdn.datatables.net/v/dt/jq-3.6.0/dt-1.13.1/r-2.4.0/sp-2.1.0/sl-1.5.0/datatables.min.css" />
    <script type="text/javascript"
        src="https://cdn.datatables.net/v/dt/jq-3.6.0/dt-1.13.1/r-2.4.0/sp-2.1.0/sl-1.5.0/datatables.min.js"></script>

    <script type="text/javascript" src="script.js"></script>

    <!--Shamelessly stole patches of CSS...-->
    <link rel="stylesheet" type="text/css" href="./main.css">
    <link rel="stylesheet" type="text/css" href="./datatable.css">

</head>



<body>
    <div class="container">
        <div class="title">
            <h2 id="calendarName"></h2>
        </div>

        <div class="buttons">
            <button id="paneLogic" class="btn"></button>
            <br>
            <button id="downloadSelectedRows" class="btn">Download Filtered Results</button>
        </div>
    </div>

    <div class="table">
        <table id="courses" class="row-border compact" width="100%">
            <thead>
                <tr>
                    <th></th>
                    <th>CRN</th>
                    <th>Section</th>
                    <th>Subject</th>
                    <th>Abbreviation</th>
                    <th>Level</th>
                    <th>Name</th>
                    <th>Description</th>
                    <th>Credits</th>
                    <th>Capacity</th>
                    <th>Registered</th>
                    <th>Remaining</th>
                    <th>Waitlisted</th>
                    <th>Attribute</th>
                    <th>Type</th>
                    <th>Time</th>
                    <th>Day</th>
                    <th>Location</th>
                    <th>Nature</th>
                    <th>Instructor</th>
                </tr>
            </thead>
        </table>
    </div>


</body>
<footer>
