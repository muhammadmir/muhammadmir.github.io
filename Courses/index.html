<!DOCTYPE html>
<html lang='en'>

<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Select Calander</title>

    <script src='multiselect-dropdown.js'></script>

    <script type='text/javascript'
        src='https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js'></script>
    <link rel='stylesheet' type='text/css'
        href='https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css'>

</head>

<style>
    select {
        width: 20em;
    }
</style>

<body>
    <h1>Please Select Calander(s)</h1>
    <label>Calander(s): </label>

    <select name='field1' id='field1' multiple multiselect-search='true' multiselect-select-all='false'
        multiselect-max-items='1' multiselect-hide-x='false'>
    </select>

    <br><br>
    <form action='/Courses/main.html' class='inline'>
        <button id='button' class="btn btn-light" action>Get Courses</button>
    </form>

</body>

<script>
    function formatOptions(options) {
        let calanders = []
        Array.from(options).forEach(function (calander) {
            calanders.push(
                {
                    'Calander ID': calander.value,
                    'Calander Name': calander.text,
                    'Processing Time': 0,
                    'Courses': []
                }
            )
        }
        );

        return JSON.stringify(calanders)
    }

    document.getElementById('button').onclick = function () {
        document.getElementById('button').value = 'Fetching courses...';

        const response = fetch('https://courses-server.muhammadmir1.repl.co/get_courses', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: formatOptions(field1.selectedOptions)
        }).json();

        if ('Error' in response) alert('Error from server: ' + response['Error']);
        else localStorage['Courses'] = response
    };

    fetch('https://courses-server.muhammadmir1.repl.co/get_calanders').then(obj => obj.json()).then(obj => {
        field1.innerHTML = obj.map(x => '<option value=' + x['Calander ID'] + '>' + x['Calander Name'] + '</option>');
        field1.loadOptions();
    })
</script>

</html>
